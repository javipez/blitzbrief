# .github/workflows/tests.yml
#
# Ejecuta la suite de tests (pytest) en cada push y pull request para
# detectar regresiones antes de que lleguen a los workflows de producción.

name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v
