# .github/workflows/blitzhealth_digest.yml
#
# Ejecuta Blitz Weekend cada domingo por la mañana (hora de España):
#   8:00 UTC = 10:00 CEST (verano) / 9:00 CET (invierno)
#
# Genera un digest semanal de salud, autores y lecturas largas y lo envía por Telegram.

name: Blitz Weekend Weekly Digest

on:
  schedule:
    # Domingos a las 8:00 UTC → 10:00 verano / 9:00 invierno
    - cron: "0 8 * * 0"

  # Permite ejecución manual
  workflow_dispatch:

jobs:
  weekend-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Blitz Weekend
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python blitzhealth.py
