# .github/workflows/elpais_digest.yml
#
# Ejecuta el bot dos veces al día (hora de España peninsular):
# Estructura de mensajes:
#   Mañana → 1) Titulares (Gemini + partidos)  2) Tiempo actual  3) Audio Jabois
#   Tarde  → 1) Artículos columnistas           2) Tiempo mañana  3) Bitcoin
#
# GitHub Actions usa UTC y no garantiza puntualidad exacta: los cron se
# ponen en cola y pueden retrasarse. Por eso disparamos varias veces por
# franja y el script evita duplicados con .blitzbrief_sent_runs.json.

name: BlitzBrief Daily Digest

on:
  schedule:
    # Mañana: varios intentos para absorber retrasos de GitHub Actions.
    - cron: "37 4 * * *"
    - cron: "7 5 * * *"
    - cron: "37 5 * * *"
    - cron: "7 6 * * *"
    # Tarde: varios intentos para absorber retrasos de GitHub Actions.
    - cron: "37 16 * * *"
    - cron: "7 17 * * *"
    - cron: "37 17 * * *"
    - cron: "7 18 * * *"

  # Permite ejecución manual desde la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      mode:
        description: "Modo de ejecución"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - morning
          - evening

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: |
            .elpais_seen_articles.json
            .blitzbrief_sent_runs.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "flag=--${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == *" 4 "* || "${{ github.event.schedule }}" == *" 5 "* || "${{ github.event.schedule }}" == *" 6 "* ]]; then
            echo "flag=--morning" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Run digest bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python elpais_telegram_bot.py ${{ steps.mode.outputs.flag }}
